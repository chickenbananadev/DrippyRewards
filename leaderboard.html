<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Top 100 — $DRIPPY Leaderboard</title>
<meta name="description" content="The top 100 burners and earners in the $DRIPPY pack." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Anton&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0610; --gold:#d4a431; --gold-bright:#f5c542; --gold-glow:#ffd966;
  --purple:#6b2dc9; --purple-bright:#a259ff; --purple-glow:#c084fc;
  --cream:#f6e9c4;
  --display:'Bowlby One', cursive; --tag:'Anton', sans-serif;
  --serif:'Fraunces', serif; --mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--black);color:var(--cream);font-family:var(--serif);
  overflow-x:hidden;scroll-behavior:smooth;
}
body{
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(107,45,201,.25) 0%, transparent 60%),
    radial-gradient(ellipse at top, #1a0a2e 0%, var(--black) 70%, #000 100%) fixed;
  min-height:100vh;padding:40px 20px 80px;
}
.wrap{max-width:820px;margin:0 auto}
.back{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:13px;color:var(--purple-glow);
  text-decoration:none;margin-bottom:24px;
  transition:color .2s ease;
}
.back:hover{color:var(--gold-glow)}
.head{text-align:center;margin-bottom:30px}
.eyebrow{
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--gold);margin-bottom:10px;
}
h1{
  font-family:var(--display);font-size:clamp(32px,7vw,56px);
  line-height:1;text-shadow:4px 4px 0 #000;
}
h1 .gold{color:var(--gold-glow)}
h1 .purple{color:var(--purple-glow)}
.sub{
  font-family:var(--mono);font-size:13px;color:rgba(246,233,196,.6);
  margin-top:12px;
}
.tabs{
  display:flex;gap:10px;max-width:480px;margin:28px auto;
}
.tab{
  flex:1;padding:14px;
  font-family:var(--display);font-size:13px;letter-spacing:.03em;
  background:rgba(20,12,30,.8);
  border:2px solid rgba(162,89,255,.3);
  border-radius:12px;color:rgba(246,233,196,.6);
  cursor:pointer;transition:all .2s ease;
}
.tab.active{
  background:linear-gradient(135deg, var(--purple), #7b3fd1);
  color:#fff;border-color:var(--purple-bright);
  box-shadow:0 4px 16px rgba(162,89,255,.3);
}
.list{display:flex;flex-direction:column;gap:8px}
.row{
  display:grid;grid-template-columns:54px 1fr auto auto;
  align-items:center;gap:14px;
  padding:14px 18px;
  background:rgba(20,12,30,.6);
  border:1px solid rgba(162,89,255,.15);
  border-radius:12px;
  transition:border-color .2s ease, transform .15s ease;
}
.row:hover{border-color:rgba(162,89,255,.4);transform:translateX(2px)}
.row.top1{border-color:rgba(255,217,102,.5);background:rgba(245,197,66,.08)}
.row.top2{border-color:rgba(192,132,252,.4)}
.row.top3{border-color:rgba(205,127,50,.4)}
.rank{
  font-family:var(--display);font-size:16px;text-align:center;
  color:var(--purple-glow);
}
.rank.top1{font-size:24px}
.who{min-width:0}
.uname{
  display:block;font-family:var(--display);font-size:15px;
  color:var(--gold);letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.addr{
  display:block;font-family:var(--mono);font-size:11px;
  color:rgba(246,233,196,.5);margin-top:2px;
}
.addr.solo{font-size:13px;color:var(--cream)}
.primary{
  font-family:var(--display);font-size:15px;color:var(--purple-glow);
  text-align:right;
}
.primary-sub{
  display:block;font-family:var(--mono);font-size:9px;
  color:rgba(246,233,196,.45);text-transform:uppercase;
  letter-spacing:.05em;margin-top:2px;
}
.secondary{
  font-family:var(--mono);font-size:12px;
  color:rgba(246,233,196,.6);text-align:right;min-width:54px;
}
.loading,.empty{
  text-align:center;padding:50px 20px;
  font-family:var(--mono);font-size:14px;
  color:rgba(246,233,196,.5);
}
.count{
  text-align:center;font-family:var(--mono);font-size:12px;
  color:rgba(246,233,196,.5);margin-top:20px;
}
@media (max-width:540px){
  .row{grid-template-columns:40px 1fr auto;gap:10px;padding:12px}
  .secondary{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="back">← Back to Drippy</a>
  <div class="head">
    <div class="eyebrow">The Pack Rankings</div>
    <h1>Top <span class="gold">100</span> <span class="purple">Pack</span></h1>
    <div class="sub">The biggest burners and earners in the Drippy pack.</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="burn">🔥 Top Burners</button>
    <button class="tab" data-type="earn">💰 Top Earners</button>
  </div>

  <div class="list" id="list">
    <div class="loading">Loading the pack...</div>
  </div>
  <div class="count" id="count"></div>
</div>

<script>
let currentType = 'burn';

function shortAddr(a){
  if(!a) return '';
  return a.slice(0,4) + '...' + a.slice(-4);
}
function fmtTokens(n){
  n = Number(n||0);
  if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}
function fmtSol(n){
  n = Number(n||0);
  if(n < 0.001) return n.toFixed(6);
  if(n < 1) return n.toFixed(4);
  return n.toFixed(3);
}

async function load(type){
  currentType = type;
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  listEl.innerHTML = '<div class="loading">Loading the pack...</div>';
  countEl.textContent = '';

  try {
    const r = await fetch('/api/leaderboard?type=' + type + '&limit=100');
    const j = await r.json();
    if(!j.entries || j.entries.length === 0){
      listEl.innerHTML = '<div class="empty">No one on the board yet. Be the first.</div>';
      return;
    }

    listEl.innerHTML = '';
    j.entries.forEach(e => {
      const row = document.createElement('div');
      let rankClass = '';
      if(e.rank === 1) rankClass = 'top1';
      else if(e.rank === 2) rankClass = 'top2';
      else if(e.rank === 3) rankClass = 'top3';
      row.className = 'row ' + rankClass;

      const medal = e.rank === 1 ? '👑' : (e.rank <= 3 ? (type==='earn'?'💰':'🔥') : '#'+e.rank);

      let primary, primaryLabel, secondary;
      if(type === 'earn'){
        primary = fmtSol(e.totalReceivedSol) + ' SOL';
        primaryLabel = 'earned';
        secondary = (e.distributionCount||0).toLocaleString() + ' drips';
      } else {
        primary = fmtTokens(e.tokensBurned);
        primaryLabel = 'burned';
        secondary = (e.burnWeightSharePct||0).toFixed(1) + '%';
      }

      const who = e.username
        ? '<span class="uname">'+e.username+'</span><span class="addr">'+shortAddr(e.wallet)+'</span>'
        : '<span class="addr solo">'+shortAddr(e.wallet)+'</span>';

      row.innerHTML =
        '<span class="rank '+rankClass+'">'+medal+'</span>'+
        '<span class="who">'+who+'</span>'+
        '<span class="primary">'+primary+'<span class="primary-sub">'+primaryLabel+'</span></span>'+
        '<span class="secondary">'+secondary+'</span>';
      listEl.appendChild(row);
    });

    countEl.textContent = 'Showing top ' + j.entries.length + ' of ' + (j.total||j.entries.length) + ' in the pack';
  } catch(e){
    listEl.innerHTML = '<div class="empty">Could not load leaderboard. Try again.</div>';
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    load(tab.dataset.type);
  });
});

load('burn');
</script>
</body>
</html>
